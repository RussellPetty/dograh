# Single-domain reverse proxy for the Coolify deployment.
#
# Coolify's traefik terminates TLS and forwards plain HTTP to this nginx on :80.
# nginx serves the Next.js UI at / and proxies the API (+ websockets) under /api/
# and MinIO objects under /voice-audio/ — so the browser talks to one origin
# (the dograh UI assumes same-origin API when NEXT_PUBLIC_BACKEND_URL is unbaked).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    # API + telephony websockets (routes live under /api/v1).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # MinIO object storage (call recordings / audio).
    location /voice-audio/ {
        proxy_pass http://minio:9000/voice-audio/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js UI (everything else), including its HMR/websocket upgrades.
    location / {
        proxy_pass http://ui:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
